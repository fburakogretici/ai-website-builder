[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NEXT_PRIVATE_TARGET = "server"

[functions]
  node_bundler = "esbuild"
  # Note: Free plan has 10s timeout, Pro plan has 26s timeout
  # This config helps optimize function execution
