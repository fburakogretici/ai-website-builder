<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{PORTFOLIO_NAME}} - {{TAGLINE}}</title>
    <meta name="description" content="{{ABOUT_TEXT}}">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="portfolio-hero">
        <img src="{{HERO_IMAGE}}" alt="Hero" class="portfolio-hero-img">
        <div class="portfolio-hero-content">
            <h1>{{PORTFOLIO_NAME}}</h1>
            <h2>{{TAGLINE}}</h2>
        </div>
    </header>
    <section class="portfolio-about">
        <h3>{{ABOUT_TITLE}}</h3>
        <p>{{ABOUT_TEXT}}</p>
    </section>
    <section class="portfolio-works">
        <h3>{{WORKS_TITLE}}</h3>
        <div class="portfolio-works-list">
            <div class="portfolio-work">
                <img src="{{WORK_1_IMAGE}}" alt="{{WORK_1_TITLE}}">
                <h4>{{WORK_1_TITLE}}</h4>
                <p>{{WORK_1_DESC}}</p>
            </div>
            <div class="portfolio-work">
                <img src="{{WORK_2_IMAGE}}" alt="{{WORK_2_TITLE}}">
                <h4>{{WORK_2_TITLE}}</h4>
                <p>{{WORK_2_DESC}}</p>
            </div>
            <div class="portfolio-work">
                <img src="{{WORK_3_IMAGE}}" alt="{{WORK_3_TITLE}}">
                <h4>{{WORK_3_TITLE}}</h4>
                <p>{{WORK_3_DESC}}</p>
            </div>
        </div>
    </section>
    <section class="portfolio-contact">
        <h3>{{CONTACT_TITLE}}</h3>
        <p><strong>Email:</strong> {{CONTACT_EMAIL}}</p>
    </section>
    <footer class="portfolio-footer">
        <p>&copy; 2025 {{PORTFOLIO_NAME}}. Tüm hakları saklıdır.</p>
    </footer>
</body>
</html>
